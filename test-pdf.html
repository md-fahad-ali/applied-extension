<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>PDF Test</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; max-width: 600px; margin: 0 auto; }
    button { padding: 15px 30px; font-size: 16px; background: #667eea; color: white; border: none; border-radius: 5px; cursor: pointer; }
    #status { margin-top: 20px; padding: 15px; background: #f5f5f5; border-radius: 5px; white-space: pre-wrap; }
  </style>
</head>
<body>
  <h1>🧪 PDF Test</h1>
  <button id="testBtn">Generate PDF</button>
  <div id="status">Click the button to test...</div>

  <script>
    const btn = document.getElementById('testBtn');
    const status = document.getElementById('status');

    btn.addEventListener('click', async () => {
      try {
        const html = `
          <html><body style="padding: 40px; font-family: Arial;">
            <h1 style="color: #667eea;">Test PDF</h1>
            <p>This is a test. If you see this, it works!</p>
            <p><strong>Date:</strong> ${new Date().toLocaleString()}</p>
          </body></html>
        `;

        status.textContent = 'Creating tab...';
        const tab = await chrome.tabs.create({ url: 'data:text/html,' + encodeURIComponent(html), active: false });
        
        status.textContent += '\nWaiting for load...';
        await new Promise(r => setTimeout(r, 3000));

        status.textContent += '\nAttaching debugger...';
        await chrome.debugger.attach({ tabId: tab.id }, '1.3');

        try {
          await chrome.debugger.sendCommand({ tabId: tab.id }, 'Page.enable');
          await new Promise(r => setTimeout(r, 500));

          status.textContent += '\nGenerating PDF...';
          const result = await chrome.debugger.sendCommand({ tabId: tab.id }, 'Page.printToPDF', {
            landscape: false, displayHeaderFooter: false, printBackground: true,
            paperWidth: 8.27, paperHeight: 11.69, marginTop: 0.5, marginBottom: 0.5,
            marginLeft: 0.5, marginRight: 0.5
          });

          const size = (result.data.length / 1024).toFixed(1);
          status.textContent += `\n✅ Success! PDF size: ${size} KB`;

          // Download
          const bytes = new Uint8Array(atob(result.data).length);
          for (let i = 0; i < bytes.length; i++) bytes[i] = atob(result.data).charCodeAt(i);
          const blob = new Blob([bytes], { type: 'application/pdf' });
          const a = document.createElement('a');
          a.href = URL.createObjectURL(blob);
          a.download = 'test.pdf';
          a.click();

          setTimeout(() => chrome.tabs.remove(tab.id), 1000);
        } finally {
          await chrome.debugger.detach({ tabId: tab.id });
        }
      } catch (error) {
        status.textContent = '❌ Error: ' + error.message;
      }
    });
  </script>
</body>
</html>
